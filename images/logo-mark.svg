<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none" role="img" aria-label="Mill-Turn Pros icon">
  <title>Mill-Turn Pros</title>

  <!-- Dark background for favicon legibility -->
  <rect width="56" height="56" rx="12" fill="#0f172a"/>

  <!-- Outer ring -->
  <circle cx="28" cy="28" r="23" stroke="#38bdf8" stroke-width="1.5" fill="rgba(56,189,248,0.05)"/>

  <!-- Inner ring -->
  <circle cx="28" cy="28" r="17" stroke="#38bdf8" stroke-width="0.6" fill="none" opacity="0.25"/>

  <!-- Tick marks -->
  <line x1="28"   y1="5"    x2="28"   y2="8"    stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <line x1="39.5" y1="48"   x2="38"   y2="45.5" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <line x1="16.5" y1="48"   x2="18"   y2="45.5" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

  <!-- Cutting insert triangle -->
  <path d="
    M 29 16.23
    L 38.69 33.02
    Q 39.69 34.75 37.69 34.75
    L 18.31 34.75
    Q 16.31 34.75 17.31 33.02
    L 27 16.23
    Q 28 14.5 29 16.23
    Z"
    stroke="#38bdf8" stroke-width="1.5" fill="rgba(56,189,248,0.15)"/>

  <!-- Insert center bore -->
  <circle cx="28" cy="28" r="3" stroke="#38bdf8" stroke-width="1.5" fill="none"/>

</svg>
