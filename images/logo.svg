<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 90" fill="none" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Mill-Turn Pros — CNC Solutions</title>

  <!--
    Mill-Turn Pros Logo
    Mark: MTP monogram with orbital swoosh ring.
    Ellipse: cx=45 cy=48 rx=43 ry=22 rotate(-25deg)
    Left point = (6, 66)  Right point = (84, 30)
    sweep=0 → over the top (bright front arc)
    sweep=1 → under the bottom (dim rear arc)
    Blue: #1e78ff
  -->

  <!-- Rear arc — dim, renders first so letters appear in front -->
  <path d="M 6 66 A 43 22 -25 0 1 84 30"
    stroke="#0a2e9e" stroke-width="5.5" fill="none"
    stroke-linecap="round" opacity="0.4"/>

  <!-- MTP letterform -->
  <text x="45" y="68"
    font-family="'Teko', 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="54" font-weight="700"
    text-anchor="middle"
    fill="#f0ebe3"
    letter-spacing="-2">MTP</text>

  <!-- Front arc — bright, sweeps over the top of the letters -->
  <path d="M 6 66 A 43 22 -25 0 0 84 30"
    stroke="#1e78ff" stroke-width="5.5" fill="none"
    stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="104" y="35"
    font-family="'Teko', 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="12" font-weight="400"
    letter-spacing="5"
    fill="#7a7166">MILL-TURN</text>

  <text x="100" y="78"
    font-family="'Teko', 'Arial Narrow', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="52" font-weight="700"
    letter-spacing="2"
    fill="#f0ebe3">PROS</text>

</svg>
